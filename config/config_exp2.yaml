# ============================================================
# Experiment 2 – SymmetryAwareLoss, 30k images, 50 epochs
# ============================================================
experiment:
  name: experiment_2
  output_dir: outputs/experiment_2

data:
  raw_dir: data/raw
  image_dir: data/images
  labels_csv: data/labels.csv
  sample_size: 30000
  train_split: 0.80
  val_split: 0.10
  test_split: 0.10
  random_seed: 42

model:
  dropout: 0.3

training:
  epochs: 50
  batch_size: 64
  lr: 0.0005
  weight_decay: 1.0e-4
  scheduler: CosineAnnealingLR
  step_size: 5
  gamma: 0.5
  early_stop_patience: 10
  num_workers: 0

loss:
  type: SymmetryAwareLoss
  symmetry_step_deg: 360.0
  loss_fold_deg: 60.0
