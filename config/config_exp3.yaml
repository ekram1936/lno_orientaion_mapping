# ============================================================
# Experiment 3 – Lower LR, CosineAnnealingLR, 10k, 50 epochs
# ============================================================
experiment:
  name: experiment_3
  output_dir: outputs/experiment_3

data:
  raw_dir: data/raw
  image_dir: data/images
  labels_csv: data/labels.csv
  sample_size: 10000
  train_split: 0.80
  val_split: 0.10
  test_split: 0.10
  random_seed: 42

model:
  dropout: 0.3

training:
  epochs: 30
  batch_size: 64
  lr: 0.0001
  weight_decay: 1.0e-4
  scheduler: CosineAnnealingLR
  step_size: 5
  gamma: 0.5
  early_stop_patience: 10
  num_workers: 0

loss:
  type: MSELoss
  symmetry_step_deg: 60.0
