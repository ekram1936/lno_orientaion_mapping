experiment:
  name: experiment4
  output_dir: outputs/experiment4

data:
  raw_dir: data/raw
  image_dir: data/images
  labels_csv: data/labels.csv
  sample_size: 10000
  train_split: 0.80
  val_split: 0.10
  test_split: 0.10
  random_seed: 42

model:
  dropout: 0.3
  output_dim: 4 # quaternion: 4 components [w, x, y, z]
  encoding: quaternion

training:
  epochs: 30
  batch_size: 64
  lr: 0.0001
  weight_decay: 1.0e-4
  scheduler: CosineAnnealingLR
  step_size: 5
  gamma: 0.5
  early_stop_patience: 10
  num_workers: 0

loss:
  type: QuaternionLoss
  symmetry_step_deg: 360.0
